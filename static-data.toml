[localization."dialogue.npc.name"]
en = "CAPTAIN EDRIC"
cn = "埃德里克队长"

[localization."dialogue.prompt"]
en = "[E] TALK TO CAPTAIN EDRIC"
cn = "[E] 与埃德里克交谈"

[localization."dialogue.offer"]
en = "Knight, restore the village stores: recover one Gold Bar, one Stone Brick, and one Wood Log, then clear the skeleton from the road."
cn = "骑士，重建村庄的物资：找回一根金条、一块石砖和一根木材，再清除路上的骷髅。"

[localization."dialogue.offerChoices"]
en = "[1] Accept quest     [2] Not now"
cn = "[1] 接受任务          [2] 暂时不要"

[localization."dialogue.active"]
en = "The oath has four tasks: recover Gold, Stone, and Wood, then defeat the skeleton on the road."
cn = "誓约有四项任务：找回金条、石砖和木材，再击败路上的骷髅。"

[localization."dialogue.activeChoices"]
en = "[SPACE] Continue     [ESC] Close"
cn = "[空格] 继续          [ESC] 关闭"

[localization."dialogue.ready"]
en = "The stores are restored and the road is safe. Hand over the supplies and receive the Royal Sigil."
cn = "物资已经补齐，道路也安全了。交出补给，我会授予你皇家徽记。"

[localization."dialogue.readyChoices"]
en = "[1] Complete quest   [2] Later"
cn = "[1] 完成任务          [2] 稍后"

[localization."dialogue.completed"]
en = "You rebuilt our stores and cleared the road. The Royal Sigil marks you as a trusted defender."
cn = "你补齐了物资并清理了道路。皇家徽记证明你是值得信赖的守护者。"

[localization."dialogue.completedChoices"]
en = "[SPACE] Farewell"
cn = "[空格] 告别"

