[localization."dialogue.npc.name"]
en = "CAPTAIN EDRIC"
cn = "埃德里克队长"

[localization."dialogue.prompt"]
en = "[E] TALK TO CAPTAIN EDRIC"
cn = "[E] 与埃德里克交谈"

[localization."dialogue.offer"]
en = "Knight, the village stores are empty. Bring me one Gold Bar from the old road."
cn = "骑士，村庄的仓库已经空了。请从旧路附近带回一根金条。"

[localization."dialogue.offerChoices"]
en = "[1] Accept quest     [2] Not now"
cn = "[1] 接受任务          [2] 暂时不要"

[localization."dialogue.active"]
en = "The Gold Bar still lies near the old road. Return when you have it."
cn = "金条还在旧路附近。找到后回来见我。"

[localization."dialogue.activeChoices"]
en = "[SPACE] Continue     [ESC] Close"
cn = "[空格] 继续          [ESC] 关闭"

[localization."dialogue.ready"]
en = "You found it. Hand over the Gold Bar and I will grant you the Royal Sigil."
cn = "你找到了。交出金条，我会授予你皇家徽记。"

[localization."dialogue.readyChoices"]
en = "[1] Complete quest   [2] Later"
cn = "[1] 完成任务          [2] 稍后"

[localization."dialogue.completed"]
en = "The Royal Sigil marks you as a trusted defender of the village."
cn = "皇家徽记证明你是村庄值得信赖的守护者。"

[localization."dialogue.completedChoices"]
en = "[SPACE] Farewell"
cn = "[空格] 告别"

